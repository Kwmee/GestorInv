# ============================================================
# Configuración principal — GestorInventario
# ============================================================

spring.application.name=gestor-inventario

# --- Base de datos ---
spring.datasource.url=jdbc:mysql://localhost:3306/gestor_inventario?useSSL=false&serverTimezone=Europe/Madrid&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- JWT ---
app.jwt.secret=${JWT_SECRET:gestor-inventario-dev-secret-cambiar-en-produccion-256bits}
app.jwt.expiracion-ms=${JWT_EXPIRACION_MS:3600000}

# --- Albaranes ---
app.albaranes.ruta-almacenamiento=./albaranes-pdf
app.empresa.nombre=Empresa Sonido S.L.
app.empresa.direccion=Polígono Industrial, Nave 7
app.empresa.telefono=+34 600 000 000
app.empresa.email=info@empresa.com
app.empresa.logo-path=classpath:static/logo.png

# --- Servidor ---
server.port=8080
server.address=127.0.0.1
server.servlet.context-path=/api

# --- Config externa (sobreescribe este fichero en instalación standalone) ---
spring.config.additional-location=optional:file:./config/

# --- Logging ---
logging.level.com.empresa=INFO
logging.level.org.springframework.security=WARN
