# ============================================================
# Configuración principal — GestorInventario
# ============================================================

spring.application.name=gestor-inventario

# --- Base de datos ---
spring.datasource.url=jdbc:mysql://localhost:3306/gestor_inventario?useSSL=false&serverTimezone=Europe/Madrid&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- JWT ---
app.jwt.secret=gestor-inventario-clave-secreta-minimo-256-bits-cambiar-en-produccion
app.jwt.expiracion-ms=28800000

# --- Albaranes ---
app.albaranes.ruta-almacenamiento=./albaranes-pdf
app.empresa.nombre=Empresa Sonido S.L.
app.empresa.direccion=Polígono Industrial, Nave 7
app.empresa.telefono=+34 600 000 000
app.empresa.email=info@empresa.com
app.empresa.logo-path=classpath:static/logo.png

# --- Servidor ---
server.port=8080
server.servlet.context-path=/api

# --- Logging ---
logging.level.com.empresa=INFO
logging.level.org.springframework.security=WARN
