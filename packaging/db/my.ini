[mysqld]
port        = 3306
socket      = MySQL
default-storage-engine = INNODB
character-set-server   = utf8mb4
collation-server       = utf8mb4_unicode_ci
bind-address           = 127.0.0.1
skip-name-resolve
max_connections        = 50
innodb_buffer_pool_size = 64M

[client]
port   = 3306
socket = MySQL
