services:

  mysql:
    image: mysql:8.0
    container_name: gestor_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-gestor1234}
      MYSQL_DATABASE: gestor_inventario
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: gestor_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/gestor_inventario?useSSL=false&serverTimezone=Europe/Madrid&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-gestor1234}
      APP_JWT_SECRET: ${JWT_SECRET:-gestor-inventario-clave-secreta-cambiar-en-produccion}
      APP_JWT_EXPIRACION_MS: 28800000
      APP_EMPRESA_NOMBRE: ${EMPRESA_NOMBRE:-Empresa Sonido S.L.}
      APP_EMPRESA_TELEFONO: ${EMPRESA_TELEFONO:-+34 600 000 000}
      APP_EMPRESA_EMAIL: ${EMPRESA_EMAIL:-info@empresa.com}
      APP_EMPRESA_DIRECCION: ${EMPRESA_DIRECCION:-Polígono Industrial, Nave 7}
      APP_ALBARANES_RUTA_ALMACENAMIENTO: /app/albaranes-pdf
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    volumes:
      - albaranes_pdf:/app/albaranes-pdf
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: gestor_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
  albaranes_pdf:
